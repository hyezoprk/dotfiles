set -g default-shell "/opt/homebrew/bin/fish"
set -g default-command "/opt/homebrew/bin/fish"
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
setw -g mouse on
setw -g mode-keys vi
set -g status-position top
set -g status-style bg=default
set -s escape-time 200
set -gq allow-passthrough all
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'xterm-ghostty:extkeys'
set -g xterm-keys on

unbind r
unbind R
unbind q
unbind [
bind R source ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
bind q kill-server
bind v copy-mode

# act like vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'migueltc13/catppuccin-tmux'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_default_color "default"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_current_color "#6db0e1"

set -g @catppuccin_date_time_text "#(/Users/hyezoprk/.config/tmux/scripts/claude_usage.sh)"
set -g status-interval 60
set -g @catppuccin_date_time_color "#89b4fa"
set -g @catppuccin_date_time_text_color "#89b4fa"
set -g @catppuccin_status_modules_right "date_time directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{s|/Users/hyezoprk|~|:pane_current_path}"

# recon — Claude Code agent dashboard
bind g display-popup -E -w 80% -h 60% "recon"        # prefix + g → dashboard
bind N display-popup -E -w 80% -h 60% "recon new"    # prefix + N → new session
bind r display-popup -E -w 80% -h 60% "recon resume" # prefix + r → resume picker
bind i run-shell "recon next"                         # prefix + i → next input agent

run '~/.config/tmux/plugins/tpm/tpm'
